<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحفظ المفسر</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="screen active" id="scr-loading"><div class="loading-spinner"></div></div>

<div class="screen" id="scr-register">
    <div class="login-card">
        <i class="fas fa-user-circle" style="font-size:50px; color:#2c5e50;"></i>
        <h3>أهلاً بك في الحفظ المفسر</h3>
        <input type="text" id="reg-name" placeholder="أدخل اسمك الثلاثي للتسجيل">
        <button class="btn-main" onclick="registerUser()">دخول النظام</button>
    </div>
</div>

<div class="screen" id="scr-main">
    <header class="app-hdr">
        <div class="hdr-brand" onclick="handleAdminTap()">الحفظ المفسر</div>
        <div id="u-name-display" class="hdr-user">...</div>
    </header>

    <main id="tab-c" class="cnt active">
        <div id="tasks-container"></div>
    </main>

    <main id="tab-q" class="cnt" style="display:none;">
        <div class="card" style="text-align:center;">
            <i class="fas fa-book-quran" style="font-size:60px; color:#2c5e50; margin-bottom:20px;"></i>
            <h3>المصحف الشريف</h3>
            <p style="color:gray; margin-bottom:25px;">رابط مباشر للمصحف المعتمد في الحلقة</p>
            <a id="quran-link" href="#" target="_blank" class="btn-main" style="text-decoration:none; display:inline-block;">فتح المصحف الآن</a>
        </div>
    </main>

    <main id="tab-p" class="cnt" style="display:none;">
        <div class="card">
            <h3 style="text-align:center; color:#2c5e50;"><i class="fas fa-handshake"></i> ميثاق الحلقة</h3>
            <div id="agreements-text" style="line-height:1.8; white-space: pre-wrap; margin-top:15px; font-size:0.95rem;"></div>
        </div>
    </main>

    <nav class="bot-nav">
        <div class="nav-it active" onclick="switchTab('c', this)"><i class="fas fa-list-check"></i><span>الالتزامات</span></div>
        <div class="nav-it" onclick="switchTab('q', this)"><i class="fas fa-book-open"></i><span>المصحف</span></div>
        <div class="nav-it" onclick="switchTab('p', this)"><i class="fas fa-file-signature"></i><span>الاتفاقية</span></div>
    </nav>
</div>

<div class="screen" id="scr-admin">
    <div class="app-hdr">
        <div class="hdr-brand">إعدادات الإدارة</div>
        <button onclick="location.reload()" style="color:white; border:none; background:none; font-family:inherit;">خروج</button>
    </div>
    <div class="cnt active">
        <div class="card">
            <label>رابط CSV لسلسلة التفسير:</label>
            <input type="text" id="sheet-url-input" placeholder="رابط النشر للويب بصيغة CSV">
            <label>رابط المصحف:</label>
            <input type="text" id="quran-url-input">
            <label>نص الاتفاقية والميثاق:</label>
            <textarea id="agreements-input" style="width:100%; height:150px; margin-top:10px; border-radius:8px; border:1px solid #ddd; padding:10px; font-family:inherit;"></textarea>
            <button class="btn-main" onclick="saveAdminSettings()" style="margin-top:20px;">حفظ وتعديل عند الجميع</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
