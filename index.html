<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حلقة الحفظ - قاعدة البيانات</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="screen active" id="scr-loading"><div class="loading-spinner"></div></div>

<div class="screen" id="scr-register">
    <div class="login-card">
        <h3>تسجيل عضو جديد</h3>
        <input type="text" id="reg-name" placeholder="الاسم الثلاثي">
        <button class="btn-main" onclick="registerUser()">إنشاء الحساب</button>
    </div>
</div>

<div class="screen" id="scr-main">
    <header class="app-hdr">
        <div class="hdr-brand" onclick="handleAdminTap()">حلقة الحفظ</div>
        <div id="user-info" class="hdr-user"></div>
    </header>

    <main class="cnt active">
        <div id="tasks-container">
            </div>
        <button id="btn-next-lesson" class="btn-main" style="display:none; margin-top:10px; background:#28a745;" onclick="unlockNext()">طلب المقطع التالي +</button>
    </main>

    <nav class="bot-nav">
        <div class="nav-it active"><i class="fas fa-database"></i><span>قاعدة الإنجاز</span></div>
        <div class="nav-it" onclick="handleAdminTap()"><i class="fas fa-user-shield"></i><span>المشرف</span></div>
    </nav>
</div>

<div class="screen" id="scr-admin">
    <div class="app-hdr">
        <div class="hdr-brand">إدارة البيانات</div>
        <button onclick="location.reload()" style="color:red; border:none; background:none;">إغلاق</button>
    </div>
    <div class="cnt active">
        <div class="card admin-actions">
            <h4>تصدير التقارير</h4>
            <button class="btn-main" onclick="exportData()" style="background:#007bff;">تنزيل ملف الإنجازات (CSV)</button>
            <p style="font-size:11px; margin-top:5px;">* الملف يحتوي على أسماء الأعضاء وما أنجزوه من حفظ ومراجعة.</p>
        </div>
        <div class="card">
            <label>رابط المصدر (CSV URL):</label>
            <input type="text" id="sheet-url-input">
            <button class="btn-main" onclick="saveAdminSettings()" style="background:#6c757d; margin-top:10px;">حفظ الرابط</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
