<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حلقة الحفظ الذكية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<div class="screen active" id="scr-loading">
    <div class="loading-spinner"></div>
</div>

<div class="screen" id="scr-login">
    <div class="login-card">
        <div class="login-icon"><i class="fas fa-quran"></i></div>
        <h2>مرحباً بك</h2>
        <button class="btn-google" onclick="signInGoogle()">دخول مباشر</button>
    </div>
</div>

<div class="screen" id="scr-main">
    <header class="app-hdr">
        <div class="hdr-brand">حلقة الحفظ</div>
        <div id="status-badge" class="hdr-user">متصل</div>
    </header>

    <main id="tab-q" class="cnt">
        <div class="card">
            <h3><i class="fas fa-book-open"></i> المصحف المفسر</h3>
            <div id="pdf-link-container"></div>
        </div>
    </main>

    <main id="tab-c" class="cnt active">
        <div class="card">
            <div class="card-header"><i class="fas fa-star"></i> <h3>ورد اليوم</h3></div>
            <div id="smart-task-content" class="task-content">جاري التحميل...</div>
            <button id="next-task-btn" class="btn-main" style="display:none; margin-top:20px;" onclick="completeTask()">تم الإنجاز - التالي</button>
        </div>

        <div class="card admin-section">
            <div id="admin-login-form">
                <button class="btn-main" style="background:#444;" onclick="checkPwPrompt()">لوحة المشرف</button>
            </div>
            <div id="admin-tools" style="display:none;">
                <div class="admin-actions">
                    <p style="color:red; font-weight:bold; font-size:12px;">بدء دورة أسبوعية جديدة:</p>
                    <button class="btn-main" onclick="startNewWeek('hifz')" style="background:#28a745; margin-bottom:10px;">أسبوع حفظ (جديد)</button>
                    <button class="btn-main" onclick="startNewWeek('review')" style="background:#007bff;">أسبوع مراجعة (تراكمي)</button>
                </div>
                <label>رابط الشيت:</label>
                <input type="text" id="sheet-url-input">
                <label>رابط المصحف:</label>
                <input type="text" id="pdf-url-input">
                <button class="btn-main" onclick="saveAdminSettings()" style="background:#6c757d; margin-top:10px;">حفظ الروابط</button>
            </div>
        </div>
    </main>

    <main id="tab-f" class="cnt">
        <div class="card">
            <h3 style="color:#d9534f;"><i class="fas fa-hand-holding-usd"></i> سجل الغرامات</h3>
            <div id="fines-content"></div>
        </div>
    </main>

    <nav class="bot-nav">
        <div class="nav-it" onclick="switchTab('q')"><i class="fas fa-book"></i><span>المصحف</span></div>
        <div class="nav-it active" onclick="switchTab('c')"><i class="fas fa-tasks"></i><span>الالتزامات</span></div>
        <div class="nav-it" onclick="switchTab('f')"><i class="fas fa-file-invoice-dollar"></i><span>الغرامات</span></div>
    </nav>
</div>

<script src="script.js"></script>
</body>
</html>
