<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحفظ المفسر - النسخة الكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #2c5e50; --bg: #f4f7f6; --danger: #dc3545; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: #333; }
        .screen { display: none; min-height: 100vh; width: 100%; }
        .screen.active { display: flex; flex-direction: column; }
        .app-hdr { background: var(--green); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .cnt { flex: 1; padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; padding-bottom: 90px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn-main { background: var(--green); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-main:active { opacity: 0.8; }
        .task-item { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #eee; }
        .bot-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 65px; }
        .nav-it { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; cursor: pointer; }
        .nav-it.active { color: var(--green); }
    </style>
</head>
<body>

<div class="screen active" id="scr-loading">
    <div style="margin: auto; text-align: center;"><i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--green);"></i><p>جاري التحميل...</p></div>
</div>

<div class="screen" id="scr-login">
    <div class="cnt" style="display:flex; align-items:center;"><div class="card" style="width:100%; text-align:center;">
        <i class="fas fa-mosque fa-3x" style="color:var(--green)"></i>
        <h2 style="margin:15px 0">حلقة الحفظ المفسر</h2>
        <button class="btn-main" onclick="handleLogin()" style="background:#4285F4"><i class="fab fa-google"></i> الدخول عبر Google</button>
    </div></div>
</div>

<div class="screen" id="scr-main">
    <header class="app-hdr">
        <div onclick="openAdmin()" style="cursor:pointer; font-weight: bold;">إدارة الحلقة</div>
        <div id="u-name" style="font-size:0.8rem; background:rgba(255,255,255,0.2); padding:4px 10px; border-radius:15px;">...</div>
    </header>
    <main class="cnt">
        <div class="card" style="display:flex; justify-content:space-around; text-align:center;">
            <div><small>إجمالي الغرامات</small><div id="u-fines" style="font-weight:bold; color:var(--danger)">0</div></div>
            <div><small>المقاطع المنجزة</small><div id="u-done" style="font-weight:bold; color:var(--green)">0</div></div>
        </div>
        <h4 style="margin-bottom:10px"><i class="fas fa-play-circle"></i> ورد اليوم:</h4>
        <div id="tasks-list">
            <p style="text-align:center; color:gray;">يجب ضبط رابط الشيت من لوحة الإدارة أولاً</p>
        </div>
    </main>
    <nav class="bot-nav">
        <div class="nav-it active"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-it" onclick="firebase.auth().signOut()"><i class="fas fa-sign-out-alt"></i><span>خروج</span></div>
    </nav>
</div>

<div class="screen" id="scr-admin">
    <header class="app-hdr"><div>لوحة تحكم المشرف</div><button onclick="showScreen('scr-main')" style="background:none; border:none; color:white">إغلاق</button></header>
    <div class="cnt">
        <div class="card">
            <h3>إعدادات المحتوى</h3>
            <label>رابط الشيت (CSV):</label>
            <input type="text" id="csv-url" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:1px solid #ddd;">
            <p style="font-size: 0.7rem; color: gray;">* تأكد أن الملف "منشور على الويب" بصيغة CSV</p>
            <button class="btn-main" onclick="saveAdmin()">حفظ الإعدادات</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// الإعدادات المحدثة
const firebaseConfig = {
  apiKey: "AIzaSyDxzFOjPwjQL0OAG5lmgOs7VxhoRLbebZc",
  authDomain: "alhifz-almufassar.firebaseapp.com",
  databaseURL: "https://alhifz-almufassar-default-rtdb.firebaseio.com",
  projectId: "alhifz-almufassar",
  storageBucket: "alhifz-almufassar.firebasestorage.app",
  messagingSenderId: "137379079577",
  appId: "1:137379079577:web:41e516c414f4997c8adf08"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let appSettings = {};

// دالة تسجيل الدخول (حل مشكلة handleLogin is not defined)
function handleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(e => alert("خطأ: " + e.message));
}

// مراقبة الحالة
auth.onAuthStateChanged(user => {
    document.getElementById('scr-loading').classList.remove('active');
    if (user) {
        currentUser = user;
        document.getElementById('u-name').innerText = user.displayName;
        showScreen('scr-main');
        initApp();
    } else {
        showScreen('scr-login');
    }
});

function initApp() {
    // جلب رابط الشيت
    db.ref('settings').on('value', s => {
        appSettings = s.val() || {};
        document.getElementById('csv-url').value = appSettings.csvUrl || '';
        loadTasksFromCSV();
    });
    // جلب بيانات المستخدم
    db.ref('users/' + currentUser.uid).on('value', s => {
        const data = s.val() || { fines: 0, done: [] };
        document.getElementById('u-fines').innerText = data.fines || 0;
        document.getElementById('u-done').innerText = (data.done || []).length;
    });
}

function loadTasksFromCSV() {
    if(!appSettings.csvUrl) return;
    fetch(appSettings.csvUrl + "?t=" + Date.now())
        .then(res => res.text())
        .then(csv => {
            const lines = csv.split('\n').slice(1);
            const container = document.getElementById('tasks-list');
            container.innerHTML = '';
            lines.forEach((line, index) => {
                const cols = line.split(',');
                if(cols[0]) {
                    container.innerHTML += `
                        <div class="card task-item">
                            <div style="flex:1"><b>${cols[0]}</b><br><small>${cols[1] || ''}</small></div>
                            <a href="${cols[2]}" target="_blank" style="color:var(--green); font-size: 1.5rem;"><i class="fas fa-play-circle"></i></a>
                        </div>`;
                }
            });
        });
}

function openAdmin() {
    const pass = prompt("كلمة سر الإدارة:");
    if(pass === "1234") showScreen('scr-admin'); // كلمة السر الافتراضية 1234
}

function saveAdmin() {
    const url = document.getElementById('csv-url').value;
    db.ref('settings').update({ csvUrl: url }).then(() => {
        alert("تم الحفظ بنجاح");
        showScreen('scr-main');
    });
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
