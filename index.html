<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحفظ المفسر</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="screen active" id="scr-loading"><div class="loading-spinner"></div></div>

<div class="screen" id="scr-register">
    <div class="login-card">
        <i class="fas fa-user-plus" style="font-size:40px; color:#2c5e50;"></i>
        <h3>تسجيل عضو جديد</h3>
        <input type="text" id="reg-name" placeholder="الاسم الثلاثي كما في الكشف">
        <button class="btn-main" onclick="registerUser()">إنشاء الحساب</button>
    </div>
</div>

<div class="screen" id="scr-main">
    <header class="app-hdr">
        <div class="hdr-brand" onclick="handleAdminTap()">الحفظ المفسر</div>
        <div id="status-badge" class="hdr-user">جاري التحميل...</div>
    </header>

    <main id="tab-c" class="cnt active">
        <div id="tasks-container"></div>
    </main>

    <main id="tab-q" class="cnt" style="display:none;">
        <div class="card" style="text-align:center;">
            <i class="fas fa-book-quran" style="font-size:50px; color:#2c5e50; margin-bottom:15px;"></i>
            <h3>المصحف الشريف</h3>
            <p id="quran-note" style="color:gray; margin-bottom:20px;">يمكنك متابعة حفظك من الرابط أدناه</p>
            <a id="quran-link" href="#" target="_blank" class="btn-main" style="text-decoration:none; display:inline-block;">فتح المصحف</a>
        </div>
    </main>

    <main id="tab-p" class="cnt" style="display:none;">
        <div class="card">
            <h3 style="text-align:center; color:#2c5e50;"><i class="fas fa-file-contract"></i> اتفاقية الحلقة</h3>
            <div id="agreements-text" style="line-height:1.8; white-space: pre-wrap; margin-top:15px;"></div>
        </div>
    </main>

    <nav class="bot-nav">
        <div class="nav-it active" onclick="switchTab('c', this)"><i class="fas fa-tasks"></i><span>الالتزامات</span></div>
        <div class="nav-it" onclick="switchTab('q', this)"><i class="fas fa-book-open"></i><span>المصحف</span></div>
        <div class="nav-it" onclick="switchTab('p', this)"><i class="fas fa-handshake"></i><span>الاتفاقية</span></div>
    </nav>
</div>

<div class="screen" id="scr-admin">
    <div class="app-hdr">
        <div class="hdr-brand">لوحة التحكم</div>
        <button onclick="location.reload()" style="color:red; border:none; background:none;">خروج</button>
    </div>
    <div class="cnt active">
        <div class="card">
            <label>رابط شيت المقاطع (CSV):</label>
            <input type="text" id="sheet-url-input" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv">
            <label>رابط المصحف:</label>
            <input type="text" id="quran-url-input">
            <label>نص الاتفاقية:</label>
            <textarea id="agreements-input" style="width:100%; height:120px; margin-top:10px; border-radius:10px; border:1px solid #ddd; padding:10px; font-family:inherit;"></textarea>
            <button class="btn-main" onclick="saveAdminSettings()" style="margin-top:15px; background:#2c5e50;">حفظ وتحديث عند الجميع</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
